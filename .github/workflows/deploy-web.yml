name: Deploy web

# Prod-only deploy. PR previews were noisy and left orphan
# `gitshow-web-pr-N` workers in the Cloudflare account after every
# push. If we ever need a preview environment again, stand up a
# dedicated staging worker (e.g. `gitshow-web-staging`) rather than
# spawning one-per-PR.
on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.2"

      - name: Install deps (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Typecheck web + shared
        run: |
          bun --filter @gitshow/shared typecheck
          bun --filter @gitshow/web typecheck

      - name: OpenNext build
        working-directory: apps/web
        run: bunx opennextjs-cloudflare build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/web
          wranglerVersion: "4"
          command: deploy --config wrangler.jsonc
