app = "gitshow-worker"
primary_region = "iad"

[build]
  # Path is relative to this fly.toml. Build context is set by the
  # positional arg to `fly deploy` (pass `.` from the repo root so the
  # Dockerfile's COPYs can reach package.json / bun.lock at the root).
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[[vm]]
  # Match the per-scan machine size (see packages/shared/src/cloud/fly.ts
  # spawnScanMachine defaults). Keeps the deploy-time base machine in
  # the same shape as the ephemeral scan machines so behaviour is
  # consistent between smoke-boots and real scans.
  size = "performance-4x"
  memory = "16384"
